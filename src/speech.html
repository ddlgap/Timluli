<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Timluli Engine</title>
  <link rel="stylesheet" href="./styles/shared.css" />
  <style>
    body {
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: 12px;
    }
    .pill[data-state="listening"] { background: rgba(239,68,68,0.18); color: #fca5a5; }
    .pill[data-state="error"]     { background: rgba(239,68,68,0.25); color: #fecaca; }
    #log {
      margin-top: 10px;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      max-height: 160px;
      overflow: auto;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div>
    <strong>Timluli Engine</strong>
    <span id="state" class="pill" data-state="idle">idle</span>
  </div>
  <p class="muted">חלון רקע — מריץ את מנוע התמלול. ניתן לסגור בבטחה.</p>
  <div id="log"></div>
  <script type="module" src="./scripts/speech.js"></script>
</body>
</html>
