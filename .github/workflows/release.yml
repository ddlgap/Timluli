name: Release

# Build, sign and publish a new Timluli release whenever a version tag is
# pushed (e.g. `git tag v1.7.0 && git push origin v1.7.0`).
#
# tauri-action builds the NSIS installer, signs the updater artifact with the
# private key (GitHub secrets below) and uploads `latest.json` to the GitHub
# Release. The installed app polls that `latest.json` and auto-updates.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/timluli_updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password chosen when generating it

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # whisper.cpp is compiled from C++ via whisper-rs, so the build needs
      # CMake + LLVM/Clang (libclang for bindgen). CMake ships with the runner;
      # install LLVM and point LIBCLANG_PATH at it.
      - name: Install LLVM
        run: choco install llvm --yes --no-progress

      - name: Install frontend dependencies
        run: npm ci

      # The PDF-translation sidecar (timluli-pdf.exe, ~31 MB PyMuPDF+PyInstaller)
      # is gitignored, so it must be BUILT here. Tauri packs resources/ at compile
      # time, so this must run before the bundle step below — otherwise the
      # installer ships without the sidecar and PDF translation is dead at runtime.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build PDF sidecar (timluli-pdf.exe)
        shell: pwsh
        run: ./src-tauri/sidecar/build_sidecar.ps1

      - name: Verify sidecar was bundled
        shell: pwsh
        run: |
          $p = "src-tauri/resources/timluli-pdf.exe"
          if (-not (Test-Path $p)) { throw "Sidecar missing: $p" }
          "Sidecar OK: {0:N1} MB" -f ((Get-Item $p).Length / 1MB)

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Timluli ${{ github.ref_name }}"
          releaseBody: "ראה את השינויים למטה. העדכון יותקן אוטומטית למשתמשים קיימים."
          releaseDraft: false
          prerelease: false
